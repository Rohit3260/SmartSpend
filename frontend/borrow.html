<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Borrow / Lend - SmartSpend</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="layout">
      <!-- SIDEBAR -->
      <div class="sidebar">
        <h2>SmartSpend</h2>

        <nav>
          <a href="dashboard.html">Dashboard</a>
          <a href="income.html">Extra Income</a>
          <a href="expenses.html">Expenses</a>
          <a href="bills.html">Bills</a>
          <a href="goals.html">Goals</a>
          <a href="borrow.html" class="active">Borrow / Lend</a>
          <a href="reports.html">Reports</a>
        </nav>

        <div class="sidebar-bottom">
          <a href="profile.html"><span id="sidebarName">User</span></a>
          <button id="logoutBtn">Logout</button>
        </div>
      </div>

      <!-- MAIN -->
      <div class="main">
        <!-- TOP -->
        <div class="topbar">
          <div>
            <h1>Borrow / Lend</h1>
            <p>Track money you gave or took</p>
          </div>
        </div>

        <!-- ALERT -->
        <div id="alertBox" class="alert hidden"></div>

        <!-- SUMMARY -->
        <div class="cards">
          <div class="card">
            <p>Total Lent</p>
            <h3 id="totalLent">₹0</h3>
          </div>

          <div class="card">
            <p>Total Borrowed</p>
            <h3 id="totalBorrowed">₹0</h3>
          </div>

          <div class="card">
            <p>Pending to Receive</p>
            <h3 id="pendingReceive">₹0</h3>
          </div>

          <div class="card">
            <p>Pending to Return</p>
            <h3 id="pendingReturn">₹0</h3>
          </div>
        </div>

        <!-- FORM -->
        <div class="form-box">
          <h2>Add Record</h2>

          <div class="form-grid">
            <div class="field">
              <label>Person Name</label>
              <input type="text" id="personName" />
              <span class="error" id="nameError"></span>
            </div>

            <div class="field">
              <label>Amount</label>
              <input type="number" id="borrowAmount" />
              <span class="error" id="amountError"></span>
            </div>

            <div class="field">
              <label>Type</label>
              <select id="borrowType">
                <option value="">Select</option>
                <option value="lent">I Lent</option>
                <option value="borrowed">I Borrowed</option>
              </select>
              <span class="error" id="typeError"></span>
            </div>

            <div class="field">
              <label>Due Date</label>
              <input type="date" id="borrowDueDate" />
            </div>

            <div class="field">
              <label>Note</label>
              <input type="text" id="borrowNote" />
            </div>
          </div>

          <button id="addBorrowBtn">Add Record</button>
        </div>

        <!-- RECORDS -->
        <div class="table-box">
          <div class="table-top">
            <h2>All Records</h2>

            <div>
              <label>Show</label>
              <select id="filterBorrow">
                <option value="all">All</option>
                <option value="lent">Lent</option>
                <option value="borrowed">Borrowed</option>
                <option value="pending">Pending</option>
                <option value="settled">Settled</option>
              </select>
            </div>
          </div>

          <p id="noRecords" class="empty-msg">No records yet.</p>

          <div id="borrowGrid" class="goals-grid"></div>
        </div>
      </div>
    </div>

    <!-- MOBILE NAV -->
    <div class="bottom-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="expenses.html">Expenses</a>
      <a href="bills.html">Bills</a>
      <a href="goals.html">Goals</a>
      <a href="borrow.html" class="active">Borrow</a>
      <a href="income.html">Income</a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/borrow.js"></script>
  </body>
</html>
