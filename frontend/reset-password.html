<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - SmartSpend</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="layout">
      <!-- SIMPLE CENTERED MAIN -->
      <div class="main">
        <div class="form-box" style="max-width: 400px; margin: 50px auto">
          <h2>Reset Password</h2>
          <p>Enter your new password</p>

          <div id="alertBox" class="alert hidden"></div>

          <p id="expiredMsg" class="error hidden">
            This reset link is invalid or expired.
          </p>

          <div id="formSection">
            <div class="field">
              <label>New Password</label>
              <input type="password" id="newPassword" />
              <span class="error" id="newPasswordError"></span>
            </div>

            <div class="field">
              <label>Confirm Password</label>
              <input type="password" id="confirmPassword" />
              <span class="error" id="confirmPasswordError"></span>
            </div>

            <button id="resetBtn">Reset Password</button>
          </div>

          <p style="margin-top: 10px">
            <a href="index.html">Back to Login</a>
          </p>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>

    <script>
      //  TOKEN
      var urlParams = new URLSearchParams(window.location.search);
      var token = urlParams.get("token");

      if (!token) {
        document.getElementById("formSection").classList.add("hidden");
        document.getElementById("expiredMsg").classList.remove("hidden");
      }

      //  HELPERS
      function showAlert(msg, type) {
        var box = document.getElementById("alertBox");
        box.textContent = msg;
        box.className = "alert " + (type || "");
      }

      function showError(id, msg) {
        var el = document.getElementById(id);
        el.textContent = msg;
      }

      function clearErrors() {
        ["newPasswordError", "confirmPasswordError"].forEach(function (id) {
          document.getElementById(id).textContent = "";
        });
      }

      //  SUBMIT
      document.getElementById("resetBtn").onclick = async function () {
        clearErrors();

        var newPassword = document.getElementById("newPassword").value;
        var confirmPassword = document.getElementById("confirmPassword").value;

        if (newPassword.length < 8) {
          showError("newPasswordError", "Minimum 8 characters required");
          return;
        }

        if (newPassword !== confirmPassword) {
          showError("confirmPasswordError", "Passwords do not match");
          return;
        }

        try {
          var res = await fetch(BASE_URL + "/api/auth/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, newPassword }),
          });

          var data = await res.json();

          if (res.ok) {
            showAlert(data.message, "success");
            document.getElementById("formSection").classList.add("hidden");

            setTimeout(function () {
              window.location.href = "index.html";
            }, 2000);
          } else {
            if (
              data.message.includes("expired") ||
              data.message.includes("invalid")
            ) {
              document.getElementById("formSection").classList.add("hidden");
              document.getElementById("expiredMsg").classList.remove("hidden");
            } else {
              showAlert(data.message);
            }
          }
        } catch (err) {
          showAlert("Server error");
        }
      };
    </script>
  </body>
</html>
